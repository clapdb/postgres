# Standalone CI for the contrib/pagestore module.
#
# The pagestore daemon and its test harness are freestanding C (they include
# only pagestore_ipc.h and libc), so this runs WITHOUT building PostgreSQL --
# it just compiles the two programs and runs the test, which exercises the
# storage logic, COW versioning, segment rollover and crash recovery across
# page sizes 4K/8K/16K.  Seconds, not minutes.
name: pagestore

on:
  push:
    paths:
      - 'contrib/pagestore/**'
      - '.github/workflows/pagestore-test.yml'
  pull_request:
    paths:
      - 'contrib/pagestore/**'
      - '.github/workflows/pagestore-test.yml'
  workflow_dispatch:

jobs:
  standalone-test:
    name: standalone daemon test (no PostgreSQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile daemon and test harness
        working-directory: contrib/pagestore
        run: |
          cc -O2 -Wall -Wextra -Werror -o pagestore_daemon pagestore_daemon.c pagestore_core.c storage_posix.c pagestore_layer.c pagestore_layer_store.c pagestore_manifest.c pagestore_memtable.c pagestore_pgcache.c -lrt
          cc -O2 -Wall -Wextra -Werror -o pagestore_test   pagestore_test.c   -lrt
          cc -O2 -Wall -Wextra -Werror -o pagestore_layer_test pagestore_layer_test.c pagestore_layer.c pagestore_layer_store.c -lrt
          cc -O2 -Wall -Wextra -Werror -o pagestore_pgcache_test pagestore_pgcache_test.c pagestore_pgcache.c -lrt

      - name: Run standalone test suite
        working-directory: contrib/pagestore
        run: ./pagestore_test ./pagestore_daemon

      - name: Run image-layer unit test
        working-directory: contrib/pagestore
        run: ./pagestore_layer_test

      - name: Run materialized-page cache unit test
        working-directory: contrib/pagestore
        run: ./pagestore_pgcache_test

  # In-engine test: build PostgreSQL and exercise the real path (smgr hijack,
  # localsvc backend over the daemon, COW read_at, WAL shipping).  Heavier --
  # it compiles PostgreSQL -- so it is a separate job.
  integration-test:
    name: in-engine integration test (PostgreSQL + daemon)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bison flex meson ninja-build pkg-config perl python3

      - name: Configure and build PostgreSQL (minimal)
        run: |
          meson setup build -Dcassert=true -Dauto_features=disabled
          ninja -C build

      - name: Prepare temporary install tree
        run: meson test -C build --suite setup

      - name: Run pagestore integration test
        run: contrib/pagestore/integration_test.sh "$(pwd)/build"

      - name: Run WAL-redo worker demo
        run: contrib/pagestore/redo_worker_demo.sh "$(pwd)/build"

      - name: Run WAL-only (non-redundant) redo demo
        run: contrib/pagestore/wal_only_redo_demo.sh "$(pwd)/build"
